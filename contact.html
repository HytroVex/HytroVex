<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | HytroVex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<div id="flashlight-container">
    <div id="reveal-layer"></div>
    <div id="cursor-glow"></div>
</div>

<header>
    <a href="home.html" class="logo-link">
        <img src="LOGO.png" alt="HytroVex Logo" class="hytrovex-logo">
    </a>

    <div class="nav-controls">
        <a href="home.html" class="home-nav-link">Home</a>
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <nav id="nav-menu">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="service.html">Service</a></li>
            <!--<li><a href="Work.html">Work</a></li>-->
        </ul>
    </nav>
</header>

<section class="hero">
    <h2 class="hero-main">
        <span class="hero-title gradient">Get In Touch</span>
    </h2>
    <p class="hero-subtitle gradient">One Vision. Endless Results.</p>

    <div class="screen">
        <h3>Send a Message</h3>
        <form action="https://formspree.io/f/mjgjjkzl" method="POST" class="contact-form">
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your Full Name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="_replyto" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="subject">Inquiry Type</label>
                <select id="subject" name="subject" onchange="applyPackageGlow(this.value)">
                    <option value="General Inquiry">General Inquiry</option>
                    <option value="Potential Project">Potential Project</option>
                    <option value="Partnership">Partnership</option>
                    <option value="bronze">Bronze Package</option>
                    <option value="silver">Silver Package</option>
                    <option value="gold">Gold Package</option>
                </select>
            </div>

            <div class="input-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us about your work..." required></textarea>
            </div>

            <button type="submit" class="btn-primary">Submit Inquiry</button>
        </form>
    </div>
</section>

<footer>
    © 2026 HytroVex. All rights reserved.
</footer>

<script>
    /**
     * Applies a dynamic metallic glow to the dropdown based on selection
     */
    function applyPackageGlow(value) {
        const dropdown = document.getElementById('subject');

        // Define the colors to match the Service page tiers
        const colors = {
            bronze: { border: '#cd7f32', glow: 'rgba(205, 127, 50, 0.6)' },
            silver: { border: '#c0c0c0', glow: 'rgba(192, 192, 192, 0.6)' },
            gold:   { border: '#ffd700', glow: 'rgba(255, 215, 0, 0.6)' },
            default: { border: 'rgba(138, 43, 226, 0.3)', glow: 'transparent' }
        };

        const theme = colors[value] || colors.default;

        // Apply dynamic styles
        dropdown.style.borderColor = theme.border;
        dropdown.style.boxShadow = `0 0 15px ${theme.glow}`;

        // Restart pulse animation for packages
        if (['bronze', 'silver', 'gold'].includes(value)) {
            dropdown.style.animation = 'none';
            setTimeout(() => { dropdown.style.animation = 'inputPulse 2s infinite'; }, 10);
        } else {
            dropdown.style.animation = 'none';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const revealLayer = document.getElementById('reveal-layer');
        const glow = document.getElementById('cursor-glow');
        const mobileMenu = document.getElementById('mobile-menu');
        const navMenu = document.getElementById('nav-menu');

        // 1. FLASHLIGHT REVEAL LOGIC
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const maskStyle = `radial-gradient(circle 180px at ${x}px ${y}px, black 0%, transparent 100%)`;

            if (revealLayer) {
                revealLayer.style.webkitMaskImage = maskStyle;
                revealLayer.style.maskImage = maskStyle;
            }
            if (glow) {
                glow.style.left = x + 'px';
                glow.style.top = y + 'px';
            }
        });

        // 2. MOBILE MENU TOGGLE
        if (mobileMenu && navMenu) {
            mobileMenu.addEventListener('click', (e) => {
                e.stopPropagation();
                navMenu.classList.toggle('active');
            });
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (navMenu.classList.contains('active')) {
                if (!navMenu.contains(e.target) && !mobileMenu.contains(e.target)) {
                    navMenu.classList.remove('active');
                }
            }
        });

        // 3. AUTO-SELECT PACKAGE FROM URL
        const urlParams = new URLSearchParams(window.location.search);
        const selectedPackage = urlParams.get('package');
        if (selectedPackage) {
            const dropdown = document.getElementById('subject');
            if (dropdown) {
                dropdown.value = selectedPackage;
                applyPackageGlow(selectedPackage);
            }
        }
    });
</script>

</body>
</html>
